<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Röwert - Gravel Coach</title>

    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0E17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Röwert">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css?v=3">
    <link rel="stylesheet" href="css/nav.css?v=3">
    <link rel="stylesheet" href="css/training.css?v=6">
    <link rel="stylesheet" href="css/analyse.css?v=3">
    <link rel="stylesheet" href="css/ernaehrung.css?v=1">
    <link rel="stylesheet" href="css/mehr.css?v=1">
</head>
<body>

    <!-- App Header -->
    <div class="app-header">
        <div class="logo">
            <div class="logo-icon">🚴</div>
            <div class="logo-text">
                <h1>RÖWERT</h1>
                <span>Gravel Coach</span>
            </div>
        </div>
        <div class="app-header-actions"></div>
    </div>

    <!-- Tab: Training -->
    <div class="tab-content active" id="tab-training">
        <!-- Sub-Navigation: Kalender / Woche / Roadmap -->
        <div class="training-subnav">
            <button class="training-subnav-btn active" data-view="calendar" onclick="switchTrainingView('calendar')">Kalender</button>
            <button class="training-subnav-btn" data-view="week" onclick="switchTrainingView('week')">Woche</button>
            <button class="training-subnav-btn" data-view="roadmap" onclick="switchTrainingView('roadmap')">Roadmap</button>
        </div>
        <div id="training-content"></div>
    </div>

    <!-- Tab: Ernährung -->
    <div class="tab-content" id="tab-ernaehrung">
        <div id="ernaehrung-content"></div>
    </div>

    <!-- Tab: Analyse -->
    <div class="tab-content" id="tab-analyse">
        <div id="analyse-content"></div>
    </div>

    <!-- Tab: Mehr / Einstellungen -->
    <div class="tab-content" id="tab-mehr">
        <div id="mehr-content"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="training" onclick="switchTab('training')">
            <span class="nav-icon">🚴</span>
            <span>Training</span>
        </button>
        <button class="nav-item" data-tab="ernaehrung" onclick="switchTab('ernaehrung')">
            <span class="nav-icon">🥗</span>
            <span>Ernährung</span>
        </button>
        <button class="nav-item" data-tab="analyse" onclick="switchTab('analyse')">
            <span class="nav-icon">📊</span>
            <span>Analyse</span>
        </button>
        <button class="nav-item" data-tab="mehr" onclick="switchTab('mehr')">
            <span class="nav-icon">⚙️</span>
            <span>Mehr</span>
        </button>
    </nav>

    <!-- Workout Detail Fullscreen View -->
    <div class="fullscreen-view" id="workout-detail-view"></div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="modal-import">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Plan Import</h2>
                <button class="modal-close" onclick="closeImport()">✕</button>
            </div>
            <div class="modal-body">
                <div class="toggle-group">
                    <button class="toggle-btn active" id="mode-replace" onclick="setImportMode('replace')">Ersetzen</button>
                    <button class="toggle-btn" id="mode-merge" onclick="setImportMode('merge')">Zusammenführen</button>
                </div>
                <div class="form-group">
                    <label class="form-label">JSON Daten</label>
                    <textarea class="form-input" id="import-text" placeholder='{"workouts": [...], "ftp": 185}' style="min-height:120px;"></textarea>
                </div>
                <button class="btn-primary" onclick="handleImport()">Importieren</button>
            </div>
        </div>
    </div>


    <!-- Log Workout Modal -->
    <div class="modal-overlay" id="modal-log">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Training loggen</h2>
                <button class="modal-close" onclick="closeLog()">✕</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:16px;">
                    <div style="font-size:16px;font-weight:700;" id="log-title"></div>
                    <div style="font-size:13px;color:var(--text-muted);" id="log-date"></div>
                </div>

                <!-- Strava Activity Selector -->
                <div id="strava-selector" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Strava-Aktivität auswählen</label>
                        <button class="btn-strava" id="btn-load-strava" onclick="loadStravaActivitiesForLog()">
                            🔄 Strava-Aktivitäten laden
                        </button>
                        <div id="strava-activities-list" style="margin-top:8px;"></div>
                    </div>
                    <div class="divider"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Dauer (min)</label>
                        <input type="number" class="form-input" id="log-duration" placeholder="60">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ø Leistung (W)</label>
                        <input type="number" class="form-input" id="log-power" placeholder="optional">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Normalisiert (NP)</label>
                        <input type="number" class="form-input" id="log-np" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Distanz (km)</label>
                        <input type="number" class="form-input" id="log-distance" placeholder="optional" step="0.1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Ø Herzfrequenz</label>
                        <input type="number" class="form-input" id="log-avghr" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Herzfrequenz</label>
                        <input type="number" class="form-input" id="log-maxhr" placeholder="optional">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Kalorien</label>
                        <input type="number" class="form-input" id="log-calories" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label class="form-label">TSS</label>
                        <input type="number" class="form-input" id="log-tss" placeholder="optional">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Wie fühlte es sich an?</label>
                    <div class="feeling-row" id="feeling-row">
                        <button class="feeling-btn" data-value="1">😫</button>
                        <button class="feeling-btn" data-value="2">😕</button>
                        <button class="feeling-btn" data-value="3">😐</button>
                        <button class="feeling-btn" data-value="4">🙂</button>
                        <button class="feeling-btn active" data-value="5">💪</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Notizen</label>
                    <textarea class="form-input" id="log-notes" placeholder="Wie lief's? Intervalle geschafft?" style="min-height: 80px;"></textarea>
                </div>

                <button class="btn-primary" onclick="saveLog()">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Edit Workout Modal -->
    <div class="modal-overlay" id="modal-edit">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Workout bearbeiten</h2>
                <button class="modal-close" onclick="closeEdit()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Datum</label>
                    <input type="date" class="form-input" id="edit-date">
                </div>
                <div class="form-group">
                    <label class="form-label">Titel</label>
                    <input type="text" class="form-input" id="edit-title">
                </div>
                <div class="form-group">
                    <label class="form-label">Dauer</label>
                    <input type="text" class="form-input" id="edit-duration" placeholder="z.B. 1h oder 90m">
                </div>
                <div class="form-group">
                    <label class="form-label">Beschreibung</label>
                    <textarea class="form-input" id="edit-desc" style="min-height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Nutrition</label>
                    <textarea class="form-input" id="edit-nutrition" style="min-height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Coach-Notiz</label>
                    <textarea class="form-input" id="edit-coach-notes" placeholder="Anpassungshinweise vom AI Coach" style="min-height: 60px;"></textarea>
                </div>
                <button class="btn-primary" onclick="saveEdit()">Speichern</button>
                <div class="divider"></div>
                <button class="btn-danger" onclick="deleteWorkoutFromEdit()">Workout löschen</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/weather.js?v=3"></script>
    <script src="js/strava.js?v=3"></script>
    <script src="js/intervals.js?v=1"></script>
    <script src="js/training.js?v=5"></script>
    <script src="js/analyse.js?v=3"></script>
    <script src="js/ernaehrung.js?v=1"></script>
    <script src="js/mehr.js?v=2"></script>
    <script src="js/app.js?v=6"></script>
</body>
</html>
